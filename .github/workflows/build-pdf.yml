name: Markdown to PDF

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'
      - '**.markdown'
  workflow_dispatch:

jobs:
  convert-markdown-to-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Pandoc and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-fonts-extra \
            fonts-noto \
            fonts-noto-cjk \
            fonts-dejavu \
            fonts-liberation \
            poppler-utils \
            ghostscript
          
          # 安装 imagemagick 用于图片转换
          sudo apt-get install -y imagemagick
          
          # 配置 ImageMagick 策略（允许处理 PDF）
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
      
      - name: Create PDF directory
        run: mkdir -p pdf_output
      
      - name: Convert Markdown to PDF
        run: |
          # 先转换所有 webp 图片为 png
          find . -name "*.webp" -type f | while read webp; do
            png="${webp%.webp}.png"
            echo "Converting $webp to $png"
            convert "$webp" "$png" 2>/dev/null || true
          done
          
          # 查找所有markdown文件
          find . -name "*.md" -type f \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/pdf_output/*" \
            -print0 | while IFS= read -r -d '' file; do
            
            echo "Converting: $file"
            
            # 获取基础文件名
            base_name=$(basename "$file" .md)
            
            # 创建临时目录
            temp_dir=$(mktemp -d)
            
            # 复制图片到临时目录（如果需要）
            cp -r . "$temp_dir/" 2>/dev/null || true
            
            # 使用 pandoc 转换，指定正确的字体
            pandoc "$file" \
              -o "pdf_output/${base_name}.pdf" \
              --pdf-engine=xelatex \
              -V mainfont="DejaVu Sans" \
              -V sansfont="DejaVu Sans" \
              -V monofont="DejaVu Sans Mono" \
              -V geometry:margin=1in \
              -V geometry:top=1in \
              -V geometry:bottom=1in \
              -V geometry:left=1.25in \
              -V geometry:right=1.25in \
              --highlight-style=tango \
              --resource-path=".:$(dirname "$file")" \
              2>&1 | grep -v "Could not convert image" || true
            
            # 清理临时目录
            rm -rf "$temp_dir"
          done
      
      - name: Check and list generated PDFs
        run: |
          echo "Generated PDFs:"
          ls -la pdf_output/ || echo "No PDFs generated"
          
          # 检查是否有成功生成的 PDF
          if [ -z "$(ls -A pdf_output/ 2>/dev/null)" ]; then
            echo "::warning::No PDF files were generated"
          else
            echo "Successfully generated $(ls pdf_output/ | wc -l) PDF files"
          fi
      
      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documents
          path: pdf_output/
          retention-days: 7
      
      - name: Create Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: pdf-v${{ github.run_number }}
          name: PDF Documents v${{ github.run_number }}
          body: |
            ## 📄 Markdown to PDF Conversion
            
            ### Details
            - **Date**: $(date '+%Y-%m-%d %H:%M:%S')
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref_name }}
            - **Status**: ✅ Success
            - **PDF Files**: $(ls pdf_output/ 2>/dev/null | wc -l)
            
            ### 📁 Files
            $(ls pdf_output/ 2>/dev/null | sed 's/^/- `/;s/$/`/')
            
            ### ⚠️ Note
            - Some images (especially WebP format) may not render correctly
            - For best results, use PNG, JPG, or PDF images
          files: pdf_output/*.pdf
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
