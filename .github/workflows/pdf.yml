name: 编译并发布 PDF 到 Release
on:
  workflow_dispatch:  # 手动触发
  release:
    types: [published] # 或者发布时触发
env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出你的代码仓库
      - name: Checkout 代码
        uses: actions/checkout@v2

      # 2. 将 Markdown 编译为 PDF
      - name: 编译 PDF 文档
        uses: shrink/actions-document-publish@v1
        id: publish-document
        with:
          # 指定你的 Markdown 文件路径，支持通配符
          sources: 'README.md docs/*.md'

      # 3. 获取当前 Release 的信息
      - name: 获取 Release 信息
        id: get_release
        uses: bruceadams/get-release@v1.2.0

      # 4. 将生成的 PDF 附加到 Release
      - name: 上传 PDF 到 Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          # 引用上一步编译出的 PDF 路径
          asset_path: ${{ steps.publish-document.outputs.pdf }}
          asset_name: 'document.pdf'
          asset_content_type: application/pdf
