name: 编译并发布 PDF 到 Release

on:
  release:
    types: [published]

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3

      - name: 编译 PDF 文档
        uses: shrink/actions-document-publish@v1
        id: publish-document
        with:
          sources: 'README.md docs/*.md'

      - name: 上传 PDF 到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.publish-document.outputs.pdf }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # 使用 PAT 而不是默认的 GITHUB_TOKEN
