name: 编译并发布 PDF 到 Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式（创建测试 PDF）'
        type: boolean
        default: false
        required: false
      tag_name:
        description: '指定 Release 标签名（如 v1.0.0）'
        type: string
        required: false
        default: 'test'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      # 安装 Node.js
      - name: 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # 安装 md-to-pdf
      - name: 安装 md-to-pdf
        run: npm install -g md-to-pdf
      
      # 编译 ae2.md 为 PDF
      - name: 编译 ae2.md 为 PDF
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode != 'true')
        run: |
          echo "📚 编译 ae2.md 为 PDF"
          
          # 使用 md-to-pdf 编译（原生支持网络图片）
          md-to-pdf ae2.md --config-file ./pdf-config.js || {
            # 如果没有配置文件，直接运行
            md-to-pdf ae2.md
          }
          
          # 重命名输出文件
          mv ae2.pdf ae2-documentation.pdf 2>/dev/null || true
          
          # 验证
          if [ -f "ae2-documentation.pdf" ]; then
            echo "✅ PDF 编译成功"
            ls -lh ae2-documentation.pdf
          else
            echo "❌ PDF 编译失败"
            exit 1
          fi
      
      # 测试模式
      - name: 测试模式 - 创建测试 PDF
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode == 'true'
        run: |
          echo "# Test PDF" > test.md
          md-to-pdf test.md
          mv test.pdf test-document.pdf
          ls -lh test-document.pdf
      
      # 验证文件
      - name: 验证文件存在
        id: verify-file
        run: |
          if [ "${{ github.event.inputs.test_mode }}" == "true" ]; then
            FILE_PATH="test-document.pdf"
          else
            FILE_PATH="ae2-documentation.pdf"
          fi
          
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          
          if [ -f "$FILE_PATH" ]; then
            echo "✅ 文件存在: $FILE_PATH"
            ls -lh "$FILE_PATH"
          else
            echo "❌ 文件不存在: $FILE_PATH"
            exit 1
          fi
      
      # 上传到 Release
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.verify-file.outputs.file_path }}
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
