name: 编译并发布 PDF 到 Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式（创建测试 PDF）'
        type: boolean
        default: false
        required: false
      tag_name:
        description: '指定 Release 标签名（如 v1.0.0）'
        type: string
        required: false
        default: 'test'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 显示触发信息
        run: |
          echo "触发方式: ${{ github.event_name }}"
          echo "测试模式: ${{ github.event.inputs.test_mode }}"
          echo "标签名: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}"
      
      # 测试模式：创建测试 PDF
      - name: 测试模式 - 创建测试文件
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode == 'true'
        run: |
          echo "🔧 测试模式：创建测试 Markdown"
          cat > test.md << 'EOF'
# Test PDF

This is a test PDF generated at $(date)

## Features
- Network image support
- GitHub Actions integration
- Auto upload to Releases

![Test Image](https://via.placeholder.com/400x200.png?text=Test+Image)

## Code Example
```python
print("Hello, World!")
