name: 编译并发布 PDF 到 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式（创建测试 PDF）'
        type: boolean
        default: false
      tag_name:
        description: '指定 Release 标签名（如 v1.0.0）'
        type: string
        required: false
        default: 'test'
      latex_mode:
        description: 'LaTeX 编译模式（实验性，使用 XeLaTeX）'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    if: >
      (github.event_name != 'push' || github.ref_type != 'tag') &&
      (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3

      - name: 显示触发信息
        run: |
          echo "触发方式: ${{ github.event_name }}"
          echo "测试模式: ${{ github.event.inputs.test_mode }}"
          echo "LaTeX 模式: ${{ github.event.inputs.latex_mode }}"
          echo "标签名: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}"

      # 新增：检查 commit message 是否包含跳过标记
      - name: 检查是否跳过构建
        id: check-skip
        if: github.event_name == 'push'
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
            echo "Commit message contains [skip ci], skipping build."
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: 生成时间戳
        id: timestamp
        run: |
          CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S UTC+8')
          echo "current_time=$CURRENT_TIME" >> $GITHUB_OUTPUT
          echo "生成时间: $CURRENT_TIME"

      # 安装依赖和中文字体（增加跳过条件）
      - name: 安装基础依赖和中文字体
        if: github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            wkhtmltopdf \
            xvfb \
            fonts-noto-cjk \
            fonts-wqy-microhei \
            fonts-wqy-zenhei \
            fontconfig
          sudo fc-cache -fv

      # LaTeX 编译模式：额外安装 TeX Live（同样增加跳过条件）
      - name: 安装 TeX Live（仅 LaTeX 模式）
        if: >
          (github.event_name == 'workflow_dispatch' && github.event.inputs.latex_mode == 'true') &&
          (github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true')
        run: |
          sudo apt-get install -y \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-lang-chinese

      # 测试模式：创建测试 PDF
      - name: 测试模式 - 创建测试 PDF
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.test_mode == 'true' &&
          github.event.inputs.latex_mode != 'true' &&
          (github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true')
        run: |
          echo "🔧 测试模式：创建测试 PDF"
          echo "# 测试 PDF" > test.md
          echo "这是一个测试 PDF，生成于 ${{ steps.timestamp.outputs.current_time }}" >> test.md
          echo "" >> test.md
          echo "> 这是一个引用块测试" >> test.md
          xvfb-run wkhtmltopdf --enable-local-file-access --encoding utf-8 test.md test.pdf
          ls -lh test.pdf

      # LaTeX 编译模式：使用 XeLaTeX 直接生成 PDF（支持 WebP 转换 + 样式修复）
      - name: LaTeX 编译模式 - 生成 PDF
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.latex_mode == 'true' &&
          (github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true')
        run: |
          echo "📚 LaTeX 模式：编译 ae2.md 为 PDF (XeLaTeX + WebP 转换)"

          if [ ! -f "ae2.md" ]; then
            echo "❌ 错误：ae2.md 文件不存在"
            exit 1
          fi

          # 1. 安装 WebP 转换工具（如果尚未安装）
          sudo apt-get install -y webp imagemagick

          # 2. 修复 Markdown 中的反斜杠路径
          sed -i 's/\\/\//g' ae2.md

          # 3. 创建自定义 LaTeX 头部文件（包含样式定义）
          cat > header.tex << 'EOF'
          % 修复删除线（使用 ulem 包，支持中文）
          \usepackage[normalem]{ulem}
          \renewcommand{\ULdepth}{0.5ex}
          \newcommand{\st}[1]{\sout{#1}}

          % 引用块样式（仿 GitHub 风格）
          \usepackage{xcolor}
          \usepackage{tcolorbox}
          \tcbuselibrary{skins,breakable}
          \newtcolorbox{quote}{%
            colback=gray!5,
            colframe=gray!30,
            boxrule=0.5pt,
            left=12pt,
            right=12pt,
            top=6pt,
            bottom=6pt,
            arc=0pt,
            outer arc=0pt,
            boxsep=0pt,
            before skip=10pt,
            after skip=10pt,
            breakable
          }

          % 定义 blockquote 环境（Pandoc 默认可能使用 blockquote）
          \newenvironment{blockquote}{\begin{quote}}{\end{quote}}

          % 行内代码样式
          \usepackage{xcolor}
          \definecolor{codebg}{RGB}{246,248,250}
          \definecolor{codefg}{RGB}{31,35,40}
          \let\oldtexttt\texttt
          \renewcommand{\texttt}[1]{%
            \colorbox{codebg}{\oldtexttt{\color{codefg}#1}}%
          }

          % 代码块样式（用 listings 包美化）
          \usepackage{listings}
          \lstset{
            basicstyle=\ttfamily\small,
            backgroundcolor=\color{codebg},
            breaklines=true,
            frame=single,
            framerule=0pt,
            rulecolor=\color{gray!30},
            aboveskip=10pt,
            belowskip=10pt,
            xleftmargin=10pt,
            xrightmargin=10pt
          }

          % 修复换行：允许长行自动换行
          \usepackage{parskip}
          \setlength{\parskip}{0.5em}
          \setlength{\emergencystretch}{3em}
          \pretolerance=1000
          \tolerance=2000
          \setlength{\hfuzz}{1pt}
          EOF

          # 4. 生成完整的 LaTeX 文档，并注入头部样式
          pandoc ae2.md -o ae2.tex \
            --pdf-engine=xelatex \
            --extract-media=./media \
            --standalone \
            --include-in-header=header.tex \
            -V mainfont="Noto Sans CJK SC" \
            -V sansfont="Noto Sans CJK SC" \
            -V monofont="Noto Sans Mono CJK SC" \
            -V CJKmainfont="Noto Sans CJK SC" \
            -V geometry:margin=2.5cm

          # 5. 将所有 WebP 图片转换为 PNG
          find ./media -name "*.webp" | while read file; do
            echo "转换 $file"
            dwebp "$file" -o "${file%.webp}.png"
            rm "$file"
          done

          # 6. 修改 LaTeX 文件中的图片扩展名 .webp -> .png
          sed -i 's/\.webp/.png/g' ae2.tex

          # 7. 修复 \hypertarget{ux...} 为正常中文标签
          python3 -c "
          import re

          def decode_ux(m):
              s = m.group(1)
              parts = re.findall(r'ux([0-9a-f]{4})', s)
              decoded = ''.join(chr(int(p, 16)) for p in parts)
              if not decoded:
                  return m.group(0)
              return f'\\\\hypertarget{{{decoded}}}{{'

          with open('ae2.tex', 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r'\\\\hypertarget\{((?:ux[0-9a-f]{4})+)\}', decode_ux, content)
          with open('ae2.tex', 'w', encoding='utf-8') as f:
              f.write(content)
          "

          # 8. 提升标题层级：将 \subsection 替换为 \section，\subsubsection 替换为 \subsection
          sed -i 's/\\subsection{/\\section{/g' ae2.tex
          sed -i 's/\\subsubsection{/\\subsection{/g' ae2.tex

          # 9. 编译 PDF（两次以确保目录和交叉引用正确）
          xelatex -interaction=nonstopmode ae2.tex
          xelatex -interaction=nonstopmode ae2.tex

          # 10. 重命名最终 PDF
          if [ -f "ae2.pdf" ]; then
            mv ae2.pdf ae2-documentation-LaTeX-test.pdf
            echo "✅ LaTeX PDF 编译成功"
            ls -lh ae2-documentation-LaTeX-test.pdf
          else
            echo "❌ LaTeX PDF 编译失败"
            exit 1
          fi

      # 正常模式：使用 wkhtmltopdf 编译
      - name: 编译 ae2.md 为 PDF (wkhtmltopdf)
        if: >
          (github.event_name == 'release' ||
           (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.test_mode != 'true' &&
            github.event.inputs.latex_mode != 'true') ||
           github.event_name == 'push') &&
          (github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true')
        run: |
          echo "📚 正常模式：编译 ae2.md 为 PDF (wkhtmltopdf)"
          if [ ! -f "ae2.md" ]; then
            echo "❌ 错误：ae2.md 文件不存在"
            exit 1
          fi
          pandoc ae2.md -o content.html \
            --standalone \
            --metadata pagetitle="Applied Energistics 2 Tutorial" \
            --metadata charset=utf-8
          sed -n '/<body>/,/<\/body>/p' content.html | sed '1d;$d' > body-content.html
          cat > final.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <style>
              * { margin:0; padding:0; box-sizing: border-box; }
              body {
                font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", "WenQuanYi Zen Hei", "Microsoft YaHei", "SimHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
                font-size: 14px;
                line-height: 1.6;
                padding: 20px;
                max-width: 900px;
                margin: 0 auto;
                color: #333;
              }
              h1, h2, h3, h4, h5, h6 {
                font-family: "Noto Sans CJK SC", "WenQuanYi Micro Hei", "WenQuanYi Zen Hei", sans-serif;
                margin-top: 1.5em;
                margin-bottom: 0.5em;
                font-weight: 600;
                line-height: 1.25;
              }
              h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
              h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
              h3 { font-size: 1.25em; }
              h4 { font-size: 1em; }
              p { margin: 0 0 0.8em 0; line-height: 1.6; }
              blockquote {
                margin: 1em 0;
                padding: 0.5em 1em;
                border-left: 4px solid #dfe2e5;
                color: #6a737d;
                background-color: #f6f8fa;
                font-style: normal;
              }
              code {
                font-family: "Courier New", "Noto Sans CJK SC", monospace;
                background-color: #f6f8fa;
                padding: 0.2em 0.4em;
                border-radius: 3px;
                font-size: 85%;
              }
              pre {
                background-color: #f6f8fa;
                padding: 1em;
                overflow-x: auto;
                border-radius: 6px;
                margin: 1em 0;
              }
              ul, ol { margin: 0.5em 0 0.8em 1.5em; padding-left: 0; }
              img { max-width: 100%; height: auto; display: block; margin: 1em auto; }
              table {
                border-collapse: collapse;
                width: 100%;
                margin: 1em 0;
                display: block;
                overflow-x: auto;
              }
              th, td { border: 1px solid #dfe2e5; padding: 6px 13px; text-align: left; }
              th { background-color: #f6f8fa; font-weight: 600; }
              hr { height: 0.25em; padding: 0; margin: 1.5em 0; background-color: #e1e4e8; border: 0; }
              a { color: #0366d6; text-decoration: none; }
              .footer-note {
                margin-top: 50px;
                padding-top: 20px;
                border-top: 1px solid #ddd;
                font-size: 12px;
                color: #666;
                text-align: center;
              }
              .content > *:first-child { margin-top: 0; }
              .content > *:last-child { margin-bottom: 0; }
            </style>
          </head>
          <body>
            <div class="content">
              $(cat body-content.html)
            </div>
            <div class="footer-note">
              <p>文档生成时间: ${{ steps.timestamp.outputs.current_time }}</p>
              <p>源文件: ae2.md | 自动生成于 GitHub Actions</p>
            </div>
          </body>
          </html>
          EOF
          xvfb-run wkhtmltopdf \
            --enable-local-file-access \
            --encoding utf-8 \
            --page-size A4 \
            --margin-top 20mm \
            --margin-bottom 20mm \
            --margin-left 20mm \
            --margin-right 20mm \
            --footer-center "[page]" \
            --footer-font-size 10 \
            --disable-smart-shrinking \
            final.html \
            ae2-documentation.pdf
          if [ -f "ae2-documentation.pdf" ]; then
            echo "✅ PDF 编译成功"
            ls -lh ae2-documentation.pdf
          else
            echo "❌ PDF 编译失败"
            exit 1
          fi

      # 验证文件存在（增加跳过条件）
      - name: 验证文件存在并设置路径
        id: verify-file
        if: github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true'
        run: |
          if [ "${{ github.event.inputs.latex_mode }}" == "true" ]; then
            FILE_PATH="ae2-documentation-LaTeX-test.pdf"
          elif [ "${{ github.event.inputs.test_mode }}" == "true" ]; then
            FILE_PATH="test.pdf"
          else
            FILE_PATH="ae2-documentation.pdf"
          fi
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          if [ -f "$FILE_PATH" ]; then
            echo "✅ 文件存在: $FILE_PATH"
            ls -lh "$FILE_PATH"
          else
            echo "❌ 文件不存在: $FILE_PATH"
            exit 1
          fi

      # 设置标签名和 Release 名称（增加跳过条件）
      - name: 设置标签名
        id: set-tag
        if: github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true'
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            TAG="nightly-$(TZ='Asia/Shanghai' date '+%Y-%m-%d-%H%M')"
            NAME="Nightly Build $(TZ='Asia/Shanghai' date '+%y-%m-%d %H:%M')"
            echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
            echo "release_name=${NAME}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.event.release.tag_name || github.event.inputs.tag_name }}"
            echo "tag_name=${TAG:-test}" >> $GITHUB_OUTPUT
            echo "release_name=AE2 Tutorial - ${TAG:-test}" >> $GITHUB_OUTPUT
            if [ "${{ github.event_name }}" == "release" ]; then
              echo "prerelease=false" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      # 生成 Release 说明（增加跳过条件）
      - name: 生成 Release 说明
        id: release-body
        if: github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true'
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            TRIGGER="push (commit: ${{ github.sha }})"
            TEST_MODE="false"
            LATEX_MODE="false"
          elif [ "${{ github.event_name }}" == "release" ]; then
            TRIGGER="release published"
            TEST_MODE="false"
            LATEX_MODE="false"
          else
            TRIGGER="manual workflow_dispatch"
            TEST_MODE="${{ github.event.inputs.test_mode || 'false' }}"
            LATEX_MODE="${{ github.event.inputs.latex_mode || 'false' }}"
          fi

          cat > release_body.md << EOF
          ## AE2 教程文档
          此 Release 包含自动生成的 PDF 文档。
          - **源文件**: \`ae2.md\`
          - **生成时间**: ${{ steps.timestamp.outputs.current_time }}
          - **触发方式**: ${TRIGGER}
          - **测试模式**: ${TEST_MODE}
          - **LaTeX 模式**: ${LATEX_MODE}
          EOF

          BODY_CONTENT=$(cat release_body.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 上传到 Release（增加跳过条件）
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        if: github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true'
        with:
          files: ${{ steps.verify-file.outputs.file_path }}
          tag_name: ${{ steps.set-tag.outputs.tag_name }}
          name: ${{ steps.set-tag.outputs.release_name }}
          make_latest: true
          prerelease: ${{ steps.set-tag.outputs.prerelease }}
          body: ${{ steps.release-body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: 显示上传完成
        if: github.event_name != 'push' || steps.check-skip.outputs.skip_build != 'true'
        run: |
          echo "✅ 上传完成"
          echo "Release 标签: ${{ steps.set-tag.outputs.tag_name }}"
          echo "Release 名称: ${{ steps.set-tag.outputs.release_name }}"
          echo "是否预发布: ${{ steps.set-tag.outputs.prerelease }}"
          echo "生成时间: ${{ steps.timestamp.outputs.current_time }}"